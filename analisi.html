<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisi Gratuita | Viva Web</title>
    <link rel="icon" type="image/png" href="viva_web.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #02021a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background: #1c1c1e; padding: 40px; border-radius: 15px; max-width: 500px; width: 100%; box-shadow: 0 0 30px rgba(255, 215, 0, 0.2); }
        h1 { font-size: 1.8rem; margin-bottom: 20px; color: #FFD700; text-align: center; }
        label { display: block; margin-bottom: 8px; font-weight: 600; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 5px; border: 1px solid #333; background: #0b1120; color: white; }
        button { width: 100%; padding: 15px; background: #FFD700; color: #02021a; border: none; border-radius: 50px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        button:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(255, 215, 0, 0.5); }
        .back { display: block; text-align: center; margin-top: 20px; color: #a1a1a6; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Analisi del tuo Business</h1>
        
        <form action="https://formspree.io/f/xkokqewv" method="POST">
            <label>Tua Email</label>
            <input type="email" name="email" placeholder="esempio@mail.it" required>
            
            <label>Link al tuo sito attuale (se presente)</label>
            <input type="url" name="website" placeholder="https://www.tuosito.it">
            
            <label>Qual è il tuo obiettivo principale?</label>
            <textarea name="message" rows="4" placeholder="Es: Voglio vendere di più con TikTok Shop" required></textarea>
            
            <button type="submit">Invia Richiesta Analisi</button>
        </form>
        <a href="index.html" class="back">← Torna alla Home</a>
    </div>
</body>
</html>
